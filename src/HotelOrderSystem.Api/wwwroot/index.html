<!doctype html>
<html lang="en" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#101828" />
  <title>Hotel Order System</title>
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="stylesheet" href="/assets/css/app.css?v=4" />
</head>
<body>
  <div id="toast" aria-live="polite"></div>
  <div id="app">
    <div class="boot-screen">
      <div class="brand-mark">H</div>
      <h1>Hotel Order System</h1>
      <p>Loading dashboard...</p>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8.0.7/dist/browser/signalr.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-analytics-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-messaging-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey: "AIzaSyAHI21qVUztDZ9RuMt8H1VHD0c7hiwy4DQ",
      authDomain: "hotelordersystem-b9b60.firebaseapp.com",
      projectId: "hotelordersystem-b9b60",
      storageBucket: "hotelordersystem-b9b60.firebasestorage.app",
      messagingSenderId: "739295170683",
      appId: "1:739295170683:web:989a93e00a497e051852de",
      measurementId: "G-EDS6J6LXBM"
    });
    firebase.analytics();

    (async function() {
      if (!("serviceWorker" in navigator)) { console.log("[FCM] SW not supported."); return; }

      var VAPID = "BD4K-0P4Yqz1lS2IV-xbe0J1XXedxDJBAkxx_2r9HgdpEUTemAY-DEgeR0iUXlJKTqhKvEDwDS_qNsqpedhh1WM";
      var SKEY = "hotel.ops.session";
      var DKEY = "hotel.ops.deviceId";

      function deviceId() {
        var d = localStorage.getItem(DKEY);
        if (!d) { d = "web-" + crypto.randomUUID(); localStorage.setItem(DKEY, d); }
        return d;
      }

      // Register cache SW
      try { await navigator.serviceWorker.register("/sw.js"); } catch(e) {}

      // Create messaging — Firebase will auto-register firebase-messaging-sw.js
      var m = firebase.messaging();
      console.log("[FCM] Messaging instance created.");

      // Foreground messages
      m.onMessage(function(p) {
        console.log("[FCM] Foreground message:", p);
        if (!p.notification) return;
        var host = document.getElementById("toast");
        if (!host) return;
        var n = document.createElement("div");
        n.className = "toast notification";
        n.innerHTML = "<strong>" + (p.notification.title || "Notification") + "</strong><br>" + (p.notification.body || "");
        n.style.cursor = "pointer";
        n.onclick = function() { window.appRefresh && window.appRefresh(); n.remove(); };
        host.appendChild(n);
        setTimeout(function() { n.remove(); }, 8000);
      });

      // Poll for login then get token
      var interval = setInterval(async function() {
        var raw = localStorage.getItem(SKEY);
        if (!raw) return;
        var sess;
        try { sess = JSON.parse(raw); } catch(e) { return; }
        if (!sess || !sess.token) return;
        clearInterval(interval);

        console.log("[FCM] User logged in. Getting token...");
        try {
          var perm = await Notification.requestPermission();
          if (perm !== "granted") { console.log("[FCM] Permission denied."); return; }
          var token = await m.getToken({ vapidKey: VAPID });
          console.log("[FCM] Token:", token);

          var apiBase = localStorage.getItem("hotel.ops.apiBase") || "";
          await fetch(apiBase + "/api/v1/auth/device-token", {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              "Authorization": "Bearer " + sess.token
            },
            body: JSON.stringify({
              deviceId: deviceId(),
              platform: "Web",
              appVersion: "1.0.0",
              fcmToken: token
            })
          });
          console.log("[FCM] Token registered!");
          window.firebaseInitialized = true;
        } catch(err) {
          console.error("[FCM] Error:", err);
        }
      }, 500);

      setTimeout(function() { clearInterval(interval); }, 30000);
    })();
  </script>
  <script src="/assets/js/app.js" defer></script>
  <script src="/assets/js/categories-extension.js" defer></script>
</body>
</html>
